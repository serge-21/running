<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#111111">
    <meta
      name="description"
      content="A tiny invite page for friends who might want to come running."
    >
    <title>Come Running?</title>
    <link rel="preload" href="assets/running-hero.png" as="image">
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="invite" aria-labelledby="page-title">
      <section class="hero">
        <img
          class="hero__image"
          src="assets/running-hero.png"
          alt="Friends jogging together through a park in the morning"
        >
        <div class="hero__shade" aria-hidden="true"></div>
        <div class="hero__content">
          <h1 id="page-title">Locate in.</h1>
          <p class="lede" id="invite-copy">
            who is gonna carry the boats and the logs? let's go on a run
          </p>
        </div>
      </section>

      <section class="details" aria-label="Run details">
        <div class="detail">
          <span class="detail__label">When</span>
          <strong id="run-when">Friday after work</strong>
        </div>
        <div class="detail">
          <span class="detail__label">Where</span>
          <strong id="run-where">62BG</strong>
        </div>
      </section>

      <section class="rsvp" aria-label="Your reply">
        <label class="name-field" for="guest-name">
          <span>Your name</span>
          <input id="guest-name" name="name" type="text" autocomplete="name" placeholder="Type your name">
        </label>
      </section>

      <section class="responses" aria-label="Reply options">
        <button class="response response--yes" type="button" data-reply="yes">
          Yes
        </button>
        <button class="response response--no" type="button" data-reply="no">
          No
        </button>
      </section>

      <p class="status" id="status" role="status" aria-live="polite"></p>

      <section class="attendees" aria-label="People attending">
        <h2>Coming</h2>
        <ul id="attendee-list">
          <li class="attendees__empty">No one yet.</li>
        </ul>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
